<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setlist #1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── LAYOUT ── */
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #1a1a1a;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 200px;
    min-width: 200px;
    background: #111;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #2a2a2a;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 16px 14px 10px;
    border-bottom: 1px solid #2a2a2a;
  }
  .sidebar-header .setlist-label {
    font-size: 8px;
    font-weight: 700;
    color: #555;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .sidebar-header .setlist-name {
    font-size: 13px;
    font-weight: 700;
    color: #eee;
    margin-top: 2px;
  }

  .song-list {
    padding: 8px 0;
    flex: 1;
  }

  .song-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 14px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .song-item:hover {
    background: #1e1e1e;
  }
  .song-item.active {
    background: #1e1e1e;
    border-left-color: #922b21;
  }
  .song-num {
    font-size: 9px;
    color: #444;
    font-weight: 600;
    min-width: 14px;
    padding-top: 1px;
  }
  .song-info { flex: 1; min-width: 0; }
  .song-name {
    font-size: 11px;
    font-weight: 600;
    color: #ccc;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .song-item.active .song-name { color: #fff; }
  .song-artist {
    font-size: 9px;
    color: #555;
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── MAIN ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #e8e4dc;
  }

  /* ── TOPBAR ── */
  #topbar {
    background: #fff;
    border-bottom: 1px solid #ddd;
    padding: 9px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 44px;
  }
  #topbar .current-song {
    font-size: 13px;
    font-weight: 700;
    color: #111;
  }
  #topbar .current-artist {
    font-size: 11px;
    color: #888;
    margin-left: 8px;
  }
  #btn-pdf {
    background: #922b21;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
  }
  #btn-pdf:hover { background: #7b2419; }
  #btn-pdf svg { width: 13px; height: 13px; }

  /* ── SHEET AREA ── */
  #sheet-area {
    flex: 1;
    overflow-y: auto;
    padding: 30px 20px;
    display: flex;
    justify-content: center;
  }

  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #999;
    gap: 10px;
  }
  #empty-state svg { opacity: 0.3; }
  #empty-state p { font-size: 13px; }

  /* ── SONG SHEET (same style as Night Nurse HTML) ── */
  .page {
    background: #ffffff;
    width: 210mm;
    min-height: 297mm;
    padding: 18mm 18mm 14mm 18mm;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
  }

  .song-title  { font-size: 32px; font-weight: 800; color: #111; letter-spacing: -0.5px; line-height: 1; }
  .song-artist-h { font-size: 14px; color: #666; margin-top: 5px; }
  .song-meta   { font-size: 8.5px; color: #aaa; margin-top: 4px; letter-spacing: 0.3px; }
  .divider     { border: none; border-top: 1px solid #bbb; margin: 5mm 0; }

  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 3mm;
  }
  .col {
    border-right: 1px solid #e0e0e0;
    padding-right: 3mm;
  }
  .col:last-child { border-right: none; padding-right: 0; padding-left: 1mm; }

  .section {
    display: inline-block;
    background: #922b21;
    color: #fff;
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
    margin-bottom: 7px;
    margin-top: 4px;
  }

  .line {
    display: flex;
    flex-wrap: nowrap;
    align-items: flex-end;
    margin-bottom: 7px;
    line-height: 1;
  }
  .cg {
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .ch {
    font-family: 'Courier New', Courier, monospace;
    font-size: 11px;
    font-weight: 700;
    color: #1a5276;
    line-height: 1;
    min-height: 15px;
    white-space: pre;
    padding-right: 3px;
  }
  .lw {
    font-size: 13px;
    font-weight: 800;
    color: #111;
    white-space: pre;
    line-height: 1.25;
  }
  .spacer { height: 10px; }

  /* ── BACKING VOCAL / PAREN LINES ── */
  .line.paren .lw {
    font-style: italic;
    font-weight: 600;
    color: #666;
    font-size: 11px;
  }
  .line.paren .ch {
    color: #6b8cae;
  }

  /* ── SOLO INDICATOR ── */
  .section.solo {
    background: #1a5276;
  }

  /* ── PRINT ── */
  @media print {
    body { background: white; display: block; height: auto; }
    #sidebar, #topbar { display: none !important; }
    #main { background: white; display: block; }
    #sheet-area { padding: 0; overflow: visible; display: block; }
    .page { box-shadow: none; width: 100%; min-height: auto; }
    @page { margin: 0; }
  }
</style>

    item.innerHTML = `
      <span class="song-num">${String(song.num || i+1).padStart(2,'0')}</span>
      <div class="song-info">
        <div class="song-name">${song.title}</div>
        <div class="song-artist">${song.artist}</div>
      </div>`;
    item.addEventListener('click', () => loadSong(song.id));
    list.appendChild(item);
  });
}

function buildBlock(block) {
  if (block.section) {
    const cls = block.solo ? ' solo' : '';
    return `<div class="section${cls}">${block.section}</div>`;
  }
  if (block.spacer) {
    return `<div class="spacer"></div>`;
  }
  if (block.line) {
    const cls = block.paren ? ' paren' : '';
    const segs = block.line.map(([ch, lw]) =>
      `<span class="cg"><span class="ch">${ch}</span><span class="lw">${lw}</span></span>`
    ).join('');
    return `<div class="line${cls}">${segs}</div>`;
  }
  return '';
}

function buildSheet(song) {
  const col1 = song.cols[0].map(buildBlock).join('\n');
  const col2 = song.cols[1].map(buildBlock).join('\n');

  return `
    <div class="page">
      <div style="margin-bottom:6mm">
        <div class="song-title">${song.title}</div>
        <div class="song-artist-h">${song.artist}</div>
        <div class="song-meta">${song.meta}</div>
      </div>
      <hr class="divider">
      <div class="columns">
        <div class="col">${col1}</div>
        <div class="col">${col2}</div>
      </div>
    </div>`;
}

function loadSong(id) {
  const song = SONGS.find(s => s.id === id);
  if (!song) return;

  // sidebar highlight
  document.querySelectorAll('.song-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.song-item[data-id="${id}"]`).classList.add('active');

  // topbar
  document.getElementById('topbar-title').textContent = song.title;
  document.getElementById('topbar-artist').textContent = song.artist;

  // sheet
  const content = document.getElementById('sheet-content');
  content.innerHTML = buildSheet(song);
  content.style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';

  // scroll to top
  document.getElementById('sheet-area').scrollTop = 0;
}

// init
buildSidebar();

// auto-load first song
if (SONGS.length > 0) loadSong(SONGS[0].id);
</script>
</body>
</html>
